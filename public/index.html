<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Data Flow App</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
  
  <div class="app-container">
    
    <!-- LOGIN VIEW -->
    <section id="login-view" class="view active">
      <div class="card glass-effect">
        <h1 class="gradient-text">Welcome Back</h1>
        <p class="subtitle">Please login to continue</p>
        <form id="login-form">
          <div class="input-group">
            <label for="username">Username</label>
            <input type="text" id="username" required>
          </div>
          <div class="input-group">
            <label for="password">Password</label>
            <div class="password-wrapper">
              <input type="password" id="password" required>
              <button type="button" id="toggle-password" class="toggle-btn">👁️</button>
            </div>
          </div>
          <p id="login-error" class="error-text"></p>
          <button type="submit" class="btn primary-btn w-100">Login</button>
        </form>
      </div>
    </section>

    <!-- MAIN DASHBOARD SHELL (visible after login) -->
    <div id="main-app-shell" class="hidden">
      
      <!-- Navbar -->
      <nav class="navbar glass-effect">
        <div class="nav-brand gradient-text">Data Flow</div>
        <div class="nav-links">
          <button id="nav-dashboard" class="nav-btn active">Dashboard</button>
          <button id="nav-add" class="nav-btn">Add New</button>
          <button id="nav-logout" class="nav-btn warning">Logout</button>
        </div>
      </nav>

      <!-- DATA ENTRY VIEW -->
      <section id="entry-view" class="view hidden">
        <div class="card glass-effect">
          <h2 id="entry-title">Enter New Record</h2>
          <form id="entry-form">
            <!-- Section 1: Basic Information -->
            <div style="margin-bottom: 20px; padding-bottom: 15px; border-bottom: 2px solid var(--border-color);">
              <h4 style="color: var(--primary-color); margin-bottom: 15px;">Basic Information</h4>
              <div class="input-row">
                <div class="input-group">
                  <label for="entry-procNo">Proc. No. *</label>
                  <input type="text" id="entry-procNo" required>
                </div>
                <div class="input-group">
                  <label for="entry-name">Name *</label>
                  <input type="text" id="entry-name" required>
                </div>
              </div>
              <div class="input-row">
                <div class="input-group">
                  <label for="entry-dob">Date of Birth (D.O.B) *</label>
                  <input type="date" id="entry-dob" required>
                </div>
                <div class="input-group">
                  <label for="entry-gender">Gender</label>
                  <select id="entry-gender">
                    <option value="">Select</option>
                    <option value="Male">Male</option>
                    <option value="Female">Female</option>
                    <option value="Other">Other</option>
                  </select>
                </div>
              </div>
            </div>

            <!-- Section 2: Position Information -->
            <div style="margin-bottom: 20px; padding-bottom: 15px; border-bottom: 2px solid var(--border-color);">
              <h4 style="color: var(--primary-color); margin-bottom: 15px;">Position Information</h4>
              <div class="input-row">
                <div class="input-group">
                  <label for="entry-designation">Designation</label>
                  <input type="text" id="entry-designation">
                </div>
                <div class="input-group">
                  <label for="entry-rank">Rank</label>
                  <input type="text" id="entry-rank">
                </div>
              </div>
              <div class="input-row">
                <div class="input-group">
                  <label for="entry-option">Option</label>
                  <input type="text" id="entry-option">
                </div>
                <div class="input-group">
                  <label for="entry-modeOfAppointment">Mode of Appointment/Promotion/Deputation</label>
                  <input type="text" id="entry-modeOfAppointment">
                </div>
              </div>
              <div class="input-row">
                <div class="input-group">
                  <label for="entry-section">Section</label>
                  <input type="text" id="entry-section">
                </div>
                <div class="input-group">
                  <label for="entry-year">Year</label>
                  <input type="number" id="entry-year">
                </div>
              </div>
              <div class="input-row">
                <div class="input-group">
                  <label for="entry-dateOfJoining">Date of Joining</label>
                  <input type="date" id="entry-dateOfJoining">
                </div>
              </div>
            </div>

            <!-- Section 3: HOS & Sanctioned Post Information -->
            <div style="margin-bottom: 20px; padding-bottom: 15px; border-bottom: 2px solid var(--border-color);">
              <h4 style="color: var(--primary-color); margin-bottom: 15px;">HOS & Sanctioned Post</h4>
              <div class="input-row">
                <div class="input-group">
                  <label for="entry-hosUpdatedPer">HOS Updated - Per</label>
                  <input type="number" id="entry-hosUpdatedPer">
                </div>
                <div class="input-group">
                  <label for="entry-hosUpdatedTerm">HOS Updated - Term</label>
                  <input type="number" id="entry-hosUpdatedTerm">
                </div>
                <div class="input-group">
                  <label for="entry-hosUpdatedTotal">HOS Updated - Total</label>
                  <input type="number" id="entry-hosUpdatedTotal">
                </div>
              </div>
              <div class="input-row">
                <div class="input-group">
                  <label for="entry-sanctionedPostPer">Sanctioned Post - Per</label>
                  <input type="number" id="entry-sanctionedPostPer">
                </div>
                <div class="input-group">
                  <label for="entry-sanctionedPostTerm">Sanctioned Post - Term</label>
                  <input type="number" id="entry-sanctionedPostTerm">
                </div>
                <div class="input-group">
                  <label for="entry-sanctionedPostTotal">Sanctioned Post - Total</label>
                  <input type="number" id="entry-sanctionedPostTotal">
                </div>
              </div>
              <div class="input-row">
                <div class="input-group">
                  <label for="entry-filled">Filled</label>
                  <input type="number" id="entry-filled">
                </div>
                <div class="input-group">
                  <label for="entry-vacant">Vacant</label>
                  <input type="number" id="entry-vacant">
                </div>
              </div>
            </div>

            <!-- Section 4: Location Information -->
            <div style="margin-bottom: 20px; padding-bottom: 15px; border-bottom: 2px solid var(--border-color);">
              <h4 style="color: var(--primary-color); margin-bottom: 15px;">Location Information</h4>
              <div class="input-row">
                <div class="input-group">
                  <label for="entry-nativeDistrict">Native District</label>
                  <input type="text" id="entry-nativeDistrict">
                </div>
                <div class="input-group">
                  <label for="entry-nativeTaluk">Native Taluk</label>
                  <input type="text" id="entry-nativeTaluk">
                </div>
              </div>
              <div class="input-row">
                <div class="input-group">
                  <label for="entry-division">Division</label>
                  <input type="text" id="entry-division">
                </div>
                <div class="input-group">
                  <label for="entry-circle">Circle</label>
                  <input type="text" id="entry-circle">
                </div>
              </div>
              <div class="input-row">
                <div class="input-group">
                  <label for="entry-subDivision">Sub Division</label>
                  <input type="text" id="entry-subDivision">
                </div>
                <div class="input-group">
                  <label for="entry-region">Region</label>
                  <input type="text" id="entry-region">
                </div>
              </div>
            </div>

            <!-- Section 5: Contact Information -->
            <div style="margin-bottom: 20px; padding-bottom: 15px; border-bottom: 2px solid var(--border-color);">
              <h4 style="color: var(--primary-color); margin-bottom: 15px;">Contact Information</h4>
              <div class="input-row">
                <div class="input-group">
                  <label for="entry-email">Email (Optional)</label>
                  <input type="email" id="entry-email">
                </div>
                <div class="input-group">
                  <label for="entry-phone">Phone (Optional)</label>
                  <input type="tel" id="entry-phone">
                </div>
              </div>
            </div>

            <!-- Section 6: Additional Notes -->
            <div style="margin-bottom: 20px;">
              <h4 style="color: var(--primary-color); margin-bottom: 15px;">Additional Notes</h4>
              <div class="input-group">
                <label for="entry-remarks">Remarks</label>
                <textarea id="entry-remarks" rows="4" placeholder="Add any additional remarks..."></textarea>
              </div>
            </div>

            <p id="entry-msg" class="success-text"></p>
            <div style="display: flex; gap: 10px;">
              <button type="submit" class="btn primary-btn">Save Record</button>
              <button type="button" id="btn-cancel-edit" class="btn" style="background-color: #6c757d; display: none;">Cancel</button>
            </div>
          </form>
        </div>
      </section>

      <!-- DASHBOARD VIEW -->
      <section id="dashboard-view" class="view hidden">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
          <h2 class="section-title">All Records</h2>
          <div style="font-size: 0.95rem; color: var(--text-sub);">
            <span id="record-count">Total: 0</span>
          </div>
        </div>
        <div class="search-bar">
          <input type="text" id="search-input" placeholder="Search by name, email, or phone..." class="search-input">
          <button id="search-btn" class="btn primary-btn">Search</button>
          <select id="sort-select" style="padding: 10px; border-radius: 5px; border: 1px solid var(--border-color); background: white; cursor: pointer;">
            <option value="createdAt-desc">Newest First</option>
            <option value="createdAt-asc">Oldest First</option>
            <option value="name-asc">Name (A-Z)</option>
            <option value="name-desc">Name (Z-A)</option>
          </select>
          <button id="export-all-btn" class="btn" style="background-color: #28a745; color: white;">📊 Export All</button>
        </div>
        <div id="loading-indicator" style="display: none; text-align: center; padding: 20px; color: var(--text-sub);">
          ⏳ Loading records...
        </div>
        <div class="records-grid" id="records-grid">
          <!-- Dynamically populated -->
        </div>
      </section>

    </div>

  </div>

  <!-- MODAL FOR FULL DETAILS -->
  <div class="modal-overlay hidden" id="details-modal">
    <div class="modal-content glass-effect scale-up">
      <button class="close-modal" id="close-modal">&times;</button>
      <h2 id="modal-name"></h2>
      <div class="modal-body" id="modal-body">
        <!-- populated dynamically -->
      </div>
      <div class="modal-actions">
        <button id="btn-export-excel" class="btn success-btn">Export Excel</button>
        <button id="btn-export-word" class="btn alt-btn">Export to Word (Tamil)</button>
        <button id="btn-edit-record" class="btn alt-btn" style="background-color: #0d6efd;">Edit Record</button>
        <button id="btn-delete-record" class="btn danger-btn">Delete Record</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
